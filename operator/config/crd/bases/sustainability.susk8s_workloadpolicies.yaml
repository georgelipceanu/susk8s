---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: workloadpolicies.sustainability.susk8s
spec:
  group: sustainability.susk8s
  names:
    kind: WorkloadPolicy
    listKind: WorkloadPolicyList
    plural: workloadpolicies
    singular: workloadpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkloadPolicy declares carbon-aware scheduling preferences for
          a set of workloads.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkloadPolicySpec describes the sustainability preferences
              for a set of workloads.
            properties:
              enforcement:
                default: soft
                description: |-
                  Enforcement controls whether the policy is a soft preference or a hard requirement.
                  Allowed values: "soft", "hard".
                enum:
                - soft
                - hard
                type: string
              maxCarbonIntensity:
                description: MaxCarbonIntensity is an optional upper bound (gCO2/kWh)
                  for eligible nodes.
                format: int32
                minimum: 0
                type: integer
              reschedule:
                description: Reschedule defines the policy for eviction-based rescheduling
                  when conditions change.
                properties:
                  cooldownSeconds:
                    description: CooldownSeconds defines the minimum time between
                      rescheduling actions to prevent churn.
                    format: int32
                    minimum: 0
                    type: integer
                  enabled:
                    default: false
                    description: Enabled turns on/off the rescheduling logic for this
                      policy.
                    type: boolean
                  evictionRateLimit:
                    description: EvictionRateLimit restricts the number of pods evicted
                      per reconciliation cycle.
                    format: int32
                    minimum: 0
                    type: integer
                  minImprovement:
                    description: MinImprovement is the minimum % of sustainability
                      improvement required to trigger eviction.
                    format: int32
                    minimum: 0
                    type: integer
                  mode:
                    default: soft
                    description: Mode defines if violations result in a "soft" warning
                      (event) or a "hard" eviction.
                    enum:
                    - soft
                    - hard
                    type: string
                required:
                - enabled
                - mode
                type: object
              schedulerHints:
                description: SchedulerHints define how the CarbonBinPack plugin should
                  weigh utilisation vs carbon.
                properties:
                  carbonWeight:
                    description: CarbonWeight is an integer 0–100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  utilisationWeight:
                    description: UtilisationWeight is an integer 0–100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
              target:
                description: Target defines which workloads are governed by this policy.
                properties:
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      MatchLabels selects workloads by labels.
                      This maps directly to Pod.metadata.labels for matching.
                    type: object
                  namespaceSelector:
                    description: |-
                      NamespaceSelector optionally restricts to namespaces with these labels.
                      If empty, all namespaces are considered.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
            required:
            - target
            type: object
          status:
            description: WorkloadPolicyStatus reports how effectively the policy is
              applied.
            properties:
              enforced:
                description: Enforced indicates whether hints/constraints have been
                  applied successfully.
                type: boolean
              matchedWorkloads:
                description: MatchedWorkloads is the number of workloads currently
                  targeted by this policy.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
