apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
  namespace: system
spec:
  dnsNames:
  - example.com.svc
  - example.com.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: operator-selfsigned-issuer 
  secretName: webhook-server-cert