apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kepler-monitor
  namespace: kepler
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kepler
  namespaceSelector:
    matchNames:
      - kepler
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics